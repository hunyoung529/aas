<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
  <title>본인신용정보 열람서비스</title>
  <style>
    * { box-sizing: border-box; }
    html, body { margin: 0; width: 100%; min-height: 100%; background: #fff; font-family: "Malgun Gothic", Arial, sans-serif; color: #222; }
    #serviceView { display: none; width: 100%; height: 100vh; border: 0; }
    .login-page { min-height: 100vh; background: #f5f7fa; }
    .login-header { height: 78px; background: #fff; border-bottom: 1px solid #ddd; display: flex; align-items: center; padding: 0 7%; }
    .login-logo { font-size: 27px; font-weight: 700; color: #0871c9; letter-spacing: -2px; }
    .login-logo small { margin-left: 10px; font-size: 14px; font-weight: 400; color: #555; letter-spacing: -1px; }
    .login-main { max-width: 1080px; margin: 0 auto; padding: 80px 24px; }
    .login-title { text-align: center; margin: 0 0 45px; font-size: 32px; letter-spacing: -2px; }
    .login-card { width: 100%; max-width: 520px; margin: 0 auto; padding: 48px 55px 44px; background: #fff; border: 1px solid #ddd; box-shadow: 0 3px 14px rgba(0,0,0,.06); }
    .login-card h2 { margin: 0 0 30px; text-align: center; font-size: 22px; }
    .login-field { margin-bottom: 14px; }
    .login-field label { display: block; margin-bottom: 8px; font-size: 14px; font-weight: 700; }
    .login-field input { width: 100%; height: 48px; padding: 0 14px; border: 1px solid #aaa; border-radius: 2px; font-size: 16px; outline: none; }
    .login-field input:focus { border-color: #0071d2; box-shadow: 0 0 0 1px #0071d2; }
    .login-button { width: 100%; height: 52px; margin-top: 14px; border: 0; border-radius: 2px; background: #0071d2; color: #fff; font-size: 17px; font-weight: 700; cursor: pointer; }
    .login-button:hover, .login-button:focus { background: #005fae; }
    .login-button:disabled { background: #8aabc7; cursor: wait; }
    .login-help { margin: 22px 0 0; text-align: center; font-size: 13px; line-height: 1.6; color: #666; }
    @media (max-width: 600px) {
      .login-header { height: 66px; padding: 0 20px; }
      .login-logo { font-size: 23px; }
      .login-logo small { display: block; margin: 2px 0 0; font-size: 11px; }
      .login-main { padding: 48px 18px; }
      .login-title { font-size: 26px; margin-bottom: 30px; }
      .login-card { padding: 36px 24px; }
    }
  </style>
</head>
<body>
  <section id="loginPage" class="login-page">
    <header class="login-header">
      <div class="login-logo">Credit4U <small>본인신용정보 열람서비스</small></div>
    </header>
    <main class="login-main">
      <h1 class="login-title">로그인</h1>
      <form id="loginForm" class="login-card" autocomplete="on">
        <h2>아이디 로그인</h2>
        <div class="login-field">
          <label for="loginId">아이디</label>
          <input id="loginId" name="username" type="text" autocomplete="username" required autofocus>
        </div>
        <div class="login-field">
          <label for="loginPassword">비밀번호</label>
          <input id="loginPassword" name="password" type="password" autocomplete="current-password" required>
        </div>
        <button id="loginButton" class="login-button" type="submit">로그인</button>
        <p class="login-help">아이디와 비밀번호를 입력해 주세요.<br>개인정보 보호를 위해 공용 PC에서는 사용 후 창을 닫아주세요.</p>
      </form>
    </main>
  </section>
  <iframe id="serviceView" title="신용정보 등록현황"></iframe>
  <script>
    const ALLOWED_ID = "gnsdud92";
    const ALLOWED_PASSWORD_HASH = "1ff0f1b30b31a2b15e885789dd1b464d1abbf0f94c664b0c10cd3ecf9353eb8f";

    async function sha256(value) {
      const bytes = new TextEncoder().encode(value);
      const digest = await crypto.subtle.digest("SHA-256", bytes);
      return Array.from(new Uint8Array(digest), byte => byte.toString(16).padStart(2, "0")).join("");
    }

    document.getElementById("loginForm").addEventListener("submit", async event => {
      event.preventDefault();

      const button = document.getElementById("loginButton");
      const id = document.getElementById("loginId").value;
      const password = document.getElementById("loginPassword").value;
      button.disabled = true;

      try {
        const passwordHash = await sha256(password);
        if (id !== ALLOWED_ID || passwordHash !== ALLOWED_PASSWORD_HASH) {
          alert("아이디나 비밀번호를 확인해주세요");
          document.getElementById("loginPassword").value = "";
          document.getElementById("loginPassword").focus();
          return;
        }

        const serviceView = document.getElementById("serviceView");
        document.getElementById("loginPage").style.display = "none";
        serviceView.src = "app.html";
        serviceView.style.display = "block";
      } catch (error) {
        console.error("Login verification failed:", error);
        alert("로그인 처리 중 오류가 발생했습니다");
      } finally {
        button.disabled = false;
      }
    });
  </script>
</body>
</html>
